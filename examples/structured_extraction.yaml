name: "Sales lead intake extraction"
description: "Extract a consistent JSON payload from messy inbound lead emails. Deterministic scoring for CI gating."

# Output contract (v1)
# Required keys (ALL must exist):
# - lead_name (string)
# - lead_email (string)
# - company (string; empty when unknown)
# - budget (string; empty when unknown)
# - timeline (string; empty when unknown)
# - project_type (string; empty when unknown)
# - summary (string)
# - services (array of strings; may be empty)
#
# Rules:
# - Return ONLY valid JSON (no markdown, no code fences, no extra text).
# - Return ALL keys. Use empty string for unknown values.
# - `services` must contain ONLY values from the allowed list below.

allowed_services: &allowed_services
  - discovery_scoping
  - mvp_build
  - web_app_build
  - mobile_app_build
  - api_backend_build
  - internal_tools
  - integration_work
  - legacy_modernization
  - performance_scaling
  - maintenance_retainer
  - ai_rnd
  - llm_app_build
  - llm_evals
  - rag_implementation
  - data_pipelines_etl
  - analytics_instrumentation
  - mlops_deployment
  - devops_platform
  - observability
  - reliability_slo
  - cloud_migration
  - cost_optimization
  - security_review
  - appsec_hardening
  - threat_modeling
  - authn_authz
  - secrets_key_management
  - website_upgrade
  - website_rebuild
  - cms_setup
  - conversion_optimization
  - fractional_cto
  - architecture_review
  - code_review
  - team_enablement

lead_intake_schema: &lead_intake_schema
  type: object
  required: [lead_name, lead_email, company, budget, timeline, project_type, summary, services]
  properties:
    lead_name: { type: string }
    lead_email: { type: string }
    company: { type: string }
    budget: { type: string }
    timeline: { type: string }
    project_type: { type: string }
    summary: { type: string }
    services: { type: array }

cases:
  - id: "basic_new_site"
    prompt:
      system: &lead_intake_system |
        You are a careful information extraction system.

        CRITICAL OUTPUT RULES:
        - Return ONLY valid JSON. No markdown. No code fences. No extra text.
        - Output must be a single JSON object.
        - Return ALL keys exactly as specified.
        - Use empty string "" for unknown values (never null).
        - `services` must be an array (may be empty).

        REQUIRED JSON SHAPE:
        {"lead_name":"","lead_email":"","company":"","budget":"","timeline":"","project_type":"","summary":"","services":[]}

        SERVICES CONTROLLED VOCABULARY (use ONLY these values):
        discovery_scoping, mvp_build, web_app_build, mobile_app_build, api_backend_build, internal_tools,
        integration_work, legacy_modernization, performance_scaling, maintenance_retainer,
        ai_rnd, llm_app_build, llm_evals, rag_implementation,
        data_pipelines_etl, analytics_instrumentation, mlops_deployment,
        devops_platform, observability, reliability_slo,
        cloud_migration, cost_optimization,
        security_review, appsec_hardening, threat_modeling, authn_authz, secrets_key_management,
        website_upgrade, website_rebuild, cms_setup, conversion_optimization,
        fractional_cto, architecture_review, code_review, team_enablement.

        QUICK SERVICE MAPPING GUIDANCE (choose the closest match; if unsure, leave services empty []):
        - "new website" / "landing page" / "marketing site" -> website_rebuild or website_upgrade (use rebuild if net-new)
        - "redesign" / "refresh" / "upgrade" -> website_upgrade
        - "CMS we can edit" -> cms_setup
        - "site speed" / "performance" -> performance_scaling
        - "SEO" / "conversions" -> conversion_optimization
        - "ongoing maintenance" / "retainer" -> maintenance_retainer
        - "LLM feature" / "AI spike" -> ai_rnd
        - "evaluate LLM outputs in CI" -> llm_evals
        - "CI/CD" -> devops_platform
        - "observability" / "monitoring" -> observability
        - "security review" -> security_review
        - "harden auth/permissions" -> appsec_hardening and/or authn_authz
      user: |
        Extract lead fields from the email into this exact JSON shape:
        {lead_name, lead_email, company, budget, timeline, project_type, summary, services}

        Email:
        ---
        Hi, this is Jordan Lee (jordan@example.com). We're looking to redesign our website and add a booking form.
        Timeline: next month.
        Budget is flexible.
        ---
    checks:
      - type: json_schema
        json_schema: *lead_intake_schema
      - type: allowed_values
        path: services
        allowed: *allowed_services
      - type: regex
        pattern: '"lead_email"\s*:\s*"[^\"]+@[^\"]+"'

  - id: "signature_block"
    prompt:
      system: *lead_intake_system
      user: |
        Extract lead fields from the email into this exact JSON shape:
        {lead_name, lead_email, company, budget, timeline, project_type, summary, services}

        Email:
        ---
        Hello,
        We need help improving our site speed and converting more traffic.

        Thanks,
        Priya N.
        priya.n@example.org
        ---
    checks:
      - type: json_schema
        json_schema: *lead_intake_schema
      - type: allowed_values
        path: services
        allowed: *allowed_services

