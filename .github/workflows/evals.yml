name: evals

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Path to eval suite YAML"
        required: true
        default: "examples/structured_extraction.yaml"
      model:
        description: "Model name"
        required: true
        default: "gpt-4.1-mini"

jobs:
  run-evals:
    # Avoid failing normal CI when the repo doesn't have secrets configured yet.
    # For workflow_dispatch runs, this will show as "skipped" until OPENAI_API_KEY is set.
    if: ${{ secrets.OPENAI_API_KEY != '' }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[openai]"

      - name: Run suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          kestrel-evals run "${{ inputs.suite }}" --model "${{ inputs.model }}" --out reports/report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/report.json
