name: evals

on:
  workflow_dispatch: {}

jobs:
  run-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[openai]"

      - name: Run suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          kestrel-evals run examples/structured_extraction.yaml --model gpt-4.1-mini --out reports/report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/report.json
