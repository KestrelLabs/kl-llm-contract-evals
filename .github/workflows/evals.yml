name: evals

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Path to eval suite YAML"
        required: true
        default: "examples/structured_extraction.yaml"
      model:
        description: "Model name"
        required: true
        default: "gpt-4.1-mini"

# Needed to commit + push the badge endpoint JSON.
permissions:
  contents: write

jobs:
  run-evals:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[openai]"

      - name: Verify OPENAI_API_KEY secret is set
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is not set. Add it in GitHub: Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi

      - name: Run suite
        id: run_suite
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          kestrel-evals run "${{ inputs.suite }}" --model "${{ inputs.model }}" --out reports/report.json

      - name: Upload report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/report.json

      - name: Generate badge endpoint JSON
        if: ${{ always() }}
        env:
          MODEL: ${{ inputs.model }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path('reports/report.json')

          model = (os.getenv('MODEL') or '').strip() or 'model?'

          if not report_path.exists():
            badge = {
              'schemaVersion': 1,
              'label': 'evals',
              'message': f'{model} · error',
              'color': 'red',
            }
          else:
            report = json.loads(report_path.read_text(encoding='utf-8'))
            total = int(report['summary']['total'])
            failed = int(report['summary']['failed'])
            passed = total - failed

            if failed == 0:
              color = 'brightgreen'
            elif passed == 0:
              color = 'red'
            else:
              color = 'orange'

            badge = {
              'schemaVersion': 1,
              'label': 'evals',
              'message': f'{model} · {passed}/{total} pass',
              'color': color,
            }

          Path('badges').mkdir(parents=True, exist_ok=True)
          Path('badges/evals.json').write_text(json.dumps(badge), encoding='utf-8')
          print(badge)
          PY

      - name: Publish badge JSON to repo
        if: ${{ always() }}
        run: |
          if [ -z "$(git status --porcelain badges/evals.json)" ]; then
            echo "No badge changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/evals.json
          git commit -m "Update evals badge"
          git push

      - name: Gate workflow on eval failures
        if: ${{ always() }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path('reports/report.json')
          if not p.exists():
            raise SystemExit('report.json missing; treating as failure')

          report = json.loads(p.read_text(encoding='utf-8'))
          failed = int(report['summary']['failed'])
          total = int(report['summary']['total'])
          if failed > 0:
            raise SystemExit(f"Eval failures: {failed}/{total}")

          print(f"All passing: {total}/{total}")
          PY
